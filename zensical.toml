# vim: set ft=toml :


[project]
docs_dir = 'docs'
edit_uri = 'edit/main/docs/'
extra_javascript = [
  'javascripts/mermaid.mjs',
]
nav = [
  { 'Home' = 'index.md' },
  { 'Pages' = [
    'backup.md',
    'aws-vault.md',
    'devpi.md',
    'git.md',
    'gnupg-key-management.md',
    'jupyterlab.md',
    'rclone.md',
    'tar-ssh.md',
    'tmux-env-var-sync.md',
    'wsl.md',
  ]},
]
repo_name = 'manselmi/notes'
repo_url = 'https://github.com/manselmi/notes'
site_author = 'Mike Anselmi'
site_name = "Mike Anselmi's notes"
site_url = 'https://manselmi.github.io/notes/'


[project.extra]
generator = true

[project.extra.annotate]
json = [
  '.s2',
]

[project.extra.tags]
aws = 'aws'
cryptography = 'cryptography'
git = 'git'
gnupg = 'gnupg'
launchd = 'launchd'
mermaid = 'mermaid'
python = 'python'
rclone = 'rclone'
security = 'security'
shell = 'shell'
ssh = 'ssh'
taskfile = 'taskfile'
tmux = 'tmux'
windows = 'windows'


[project.theme]
features = [
  'content.action.edit',
  'content.action.view',
  'content.code.annotate',
  'content.code.copy',
  'content.code.select',
  'content.tooltips',
  'navigation.expand',
  'navigation.path',
  'navigation.prune',
  'navigation.sections',
  'navigation.tracking',
  'toc.follow',
]
language = 'en'
variant = 'modern'

[project.theme.icon]
edit = 'material/file-edit-outline'
repo = 'fontawesome/brands/git-alt'
view = 'material/file-eye-outline'

[[project.theme.palette]]
accent = 'orange'
media = '(prefers-color-scheme: dark)'
primary = 'indigo'
scheme = 'slate'
toggle.icon = 'lucide/moon'
toggle.name = 'Switch to light mode'

[[project.theme.palette]]
accent = 'indigo'
media = '(prefers-color-scheme: light)'
primary = 'indigo'
scheme = 'default'
toggle.icon = 'lucide/sun'
toggle.name = 'Switch to dark mode'


[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = 'zensical.extensions.emoji.to_svg'
emoji_index = 'zensical.extensions.emoji.twemoji'
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = '__span'
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
auto_append = [
  'includes/glossary.md',
]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = 'mermaid', class = 'mermaid', format = 'pymdownx.superfences.fence_code_format' },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.zensical.extensions.macros]
module_name = 'macros'
on_error_fail = true
on_undefined = 'strict'


[project.validation]
unused_footnotes = false  # workaround a bug
