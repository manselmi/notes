# vim: set ft=toml :


name: 'Documentation'

on:
  push:
    branches:
      - 'main'

permissions:
  contents: 'read'
  id-token: 'write'
  pages: 'write'

jobs:
  deploy:
    environment:
      name: 'github-pages'
      url: '${{ steps.deployment.outputs.page_url }}'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/configure-pages@v6'
      - uses: 'actions/checkout@v6'
      - uses: 'jdx/mise-action@v4'
        with:
          cache: false
      - run: 'pixi run -- zensical build --clean --strict'
      - uses: 'actions/upload-pages-artifact@v5'
        with:
          path: 'site'
      - uses: 'actions/deploy-pages@v5'
        id: 'deployment'
