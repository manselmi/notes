# vim: set ft=toml :


min_version = '2026.5.13'


[hooks]
postinstall = [{ task = 'hooks-install' }, { run = 'pixi install --all' }]


[settings]
experimental = true
locked = true
lockfile = true
lockfile_platforms = ['linux-x64', 'macos-arm64']
unix_default_file_shell_args = 'sh -eu'
unix_default_inline_shell_args = 'sh -eu -c'


[tasks.hooks-install]
hide = true
run = [{ task = 'hooks-uninstall' }, 'hk install --mise']

[tasks.hooks-uninstall]
hide = true
run = 'hk uninstall'

[tasks.lint]
run = 'hk fix --all'

[tasks.serve]
run = 'pixi run -- zensical serve --open --strict'

[tasks.upgrade]
env.MISE_LOCKED = '0'
run = ['mise upgrade --local', 'mise lock', 'pixi update']


[tools]
hk = 'latest'
pixi = 'latest'
pkl = 'latest'
