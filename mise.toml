# vim: set ft=toml :


# https://github.com/jdx/mise/pull/10111
min_version = '2026.5.16'


[hooks]
postinstall = [{ task = 'hooks-install' }, { run = 'pixi install --all' }]


[settings]
experimental = true
locked = true
lockfile = true
lockfile_platforms = ['linux-x64', 'macos-arm64']
unix_default_file_shell_args = 'sh -eu'
unix_default_inline_shell_args = 'sh -eu -c'


[tasks.build]
depends = ['lint']
run = 'pixi run -- zensical build --clean --strict'

[tasks.hooks-install]
hide = true
run = [{ task = 'hooks-uninstall' }, 'hk install --mise']

[tasks.hooks-uninstall]
hide = true
run = 'hk uninstall'

[tasks.lint]
run = """\
if test -n "${CI:-}"; then \
  HK_CMD='check'; \
else \
  HK_CMD='fix'; \
fi; \
hk "${HK_CMD}" --all"""

[tasks.serve]
run = 'pixi run -- zensical serve --open --strict'

[tasks.upgrade]
# required to correctly initialize lockfile when locked = true as of 2026.5.16
env.MISE_LOCKED = '0'
run = ['mise upgrade --local', 'mise lock', 'pixi update']


[tools]
hk = 'latest'
pixi = 'latest'
pkl = 'latest'
